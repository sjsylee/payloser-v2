name: Web CD

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "packages/config/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL || secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY: ${{ vars.NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY || secrets.NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY }}

    steps:
      - name: Check Vercel secrets
        id: secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice::Vercel secrets are not configured. Skipping web deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.secrets.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm --filter @payloser/shared build

      - name: Pull Vercel environment
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Export required public web env
        if: steps.secrets.outputs.ready == 'true'
        run: |
          set -euo pipefail

          ENV_FILE=".vercel/.env.production.local"
          ACTIONS_NEXT_PUBLIC_API_BASE_URL="${NEXT_PUBLIC_API_BASE_URL:-}"
          ACTIONS_NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY="${NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY:-}"

          if [ -f "$ENV_FILE" ]; then
            set -a
            . "$ENV_FILE"
            set +a
          fi

          if [ -n "$ACTIONS_NEXT_PUBLIC_API_BASE_URL" ]; then
            NEXT_PUBLIC_API_BASE_URL="$ACTIONS_NEXT_PUBLIC_API_BASE_URL"
          fi

          if [ -n "$ACTIONS_NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY" ]; then
            NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY="$ACTIONS_NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY"
          fi

          for key in NEXT_PUBLIC_API_BASE_URL; do
            value="${!key:-}"

            if [ -z "$value" ]; then
              echo "::error::$key is missing or empty. Add it as a GitHub Actions repository variable or secret for prebuilt Vercel deployments."
              exit 1
            fi

            echo "$key=$value" >> "$GITHUB_ENV"
          done

          if [ -n "${NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY:-}" ]; then
            echo "NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY=$NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY" >> "$GITHUB_ENV"
          else
            echo "::notice::NEXT_PUBLIC_KAKAO_JAVASCRIPT_KEY is not set. Kakao login still works through the API redirect, but Kakao SDK sharing will be disabled."
          fi

      - name: Build web with Vercel
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm dlx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt web
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
