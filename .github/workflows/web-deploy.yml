name: Web CD

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "packages/config/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Check Vercel secrets
        id: secrets
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::notice::Vercel secrets are not configured. Skipping web deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.secrets.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel environment
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN" --cwd apps/web

      - name: Build web with Vercel
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm dlx vercel@latest build --prod --token="$VERCEL_TOKEN" --cwd apps/web

      - name: Deploy prebuilt web
        if: steps.secrets.outputs.ready == 'true'
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN" --cwd apps/web
