name: Shared CI

on:
  push:
    paths:
      - "packages/shared/**"
      - "packages/config/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".github/workflows/shared-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/shared/**"
      - "packages/config/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".github/workflows/shared-ci.yml"

jobs:
  shared:
    name: Shared Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @payloser/shared lint

      - name: Test
        run: pnpm --filter @payloser/shared test

      - name: Build
        run: pnpm --filter @payloser/shared build
