name: API CD

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "packages/config/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "tsconfig.base.json"
      - ".dockerignore"
      - "infra/deploy/**"
      - ".github/workflows/api-deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api
  API_IMAGE_PLATFORMS: ${{ vars.API_IMAGE_PLATFORMS || 'linux/amd64' }}

jobs:
  build:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ env.API_IMAGE_PLATFORMS }}

      - name: Export image name
        id: image
        run: echo "image=${REGISTRY}/${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy API to NAS
    runs-on: ubuntu-latest
    needs: build
    environment: production
    env:
      NAS_HOST: ${{ secrets.NAS_HOST }}
      NAS_PORT: ${{ secrets.NAS_PORT }}
      NAS_USER: ${{ secrets.NAS_USER }}
      NAS_SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
      NAS_APP_DIR: ${{ secrets.NAS_APP_DIR }}
      GHCR_PAT: ${{ secrets.GHCR_PAT }}

    steps:
      - name: Check NAS deployment secrets
        id: secrets
        run: |
          if [ -z "$NAS_HOST" ] || [ -z "$NAS_USER" ] || [ -z "$NAS_SSH_KEY" ] || [ -z "$NAS_APP_DIR" ] || [ -z "$GHCR_PAT" ]; then
            echo "::notice::NAS deployment secrets are not configured. Image was pushed, but server deployment was skipped."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.secrets.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_PORT || 22 }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          script: |
            set -euo pipefail
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"

            resolve_bin() {
              if command -v "$1" >/dev/null 2>&1; then
                command -v "$1"
              elif [ -x "/usr/local/bin/$1" ]; then
                echo "/usr/local/bin/$1"
              else
                return 1
              fi
            }

            DOCKER_BIN="$(resolve_bin docker || true)"
            if [ -z "$DOCKER_BIN" ]; then
              echo "Docker binary was not found. PATH=$PATH"
              exit 1
            fi

            if "$DOCKER_BIN" info >/dev/null 2>&1; then
              DOCKER="$DOCKER_BIN"
              SUDO_PREFIX=""
            elif command -v sudo >/dev/null 2>&1 && sudo -n "$DOCKER_BIN" info >/dev/null 2>&1; then
              DOCKER="sudo -n $DOCKER_BIN"
              SUDO_PREFIX="sudo -n"
            else
              echo "Docker is installed at $DOCKER_BIN, but ${USER:-NAS_USER} cannot access the Docker daemon."
              echo "Grant Docker access to the deploy user or configure passwordless sudo for Docker commands."
              exit 1
            fi

            cd "${{ secrets.NAS_APP_DIR }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            echo "${{ secrets.GHCR_PAT }}" | $DOCKER login ghcr.io \
              -u "${{ github.actor }}" --password-stdin

            export PAYLOSER_API_IMAGE="${{ needs.build.outputs.image }}"

            if $DOCKER compose version >/dev/null 2>&1; then
              COMPOSE="$DOCKER compose"
            else
              DOCKER_COMPOSE_BIN="$(resolve_bin docker-compose || true)"
              if [ -n "$DOCKER_COMPOSE_BIN" ]; then
                COMPOSE="${SUDO_PREFIX:+$SUDO_PREFIX }$DOCKER_COMPOSE_BIN"
              else
                echo "Docker Compose is unavailable. Checked docker compose plugin and docker-compose binary."
                exit 1
              fi
            fi

            if ! $COMPOSE version >/dev/null 2>&1; then
              echo "Docker Compose was found but cannot run: $COMPOSE"
              echo "Check Docker socket permission or passwordless sudo for the deploy user."
              exit 1
            fi

            if [ -f infra/deploy/compose.api.example.yaml ]; then
              cp infra/deploy/compose.api.example.yaml docker-compose.yaml
            fi

            if [ -f .env.production ]; then
              ln -sfn .env.production .env
            else
              echo ".env.production is missing in ${{ secrets.NAS_APP_DIR }}"
              exit 1
            fi

            $COMPOSE pull api
            $COMPOSE run --rm api sh -lc \
              "pnpm --filter @payloser/api exec prisma migrate deploy --schema=prisma/schema.prisma"
            $COMPOSE up -d --no-deps api
            $DOCKER image prune -f

            echo "Payloser API deploy complete"
