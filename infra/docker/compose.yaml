services:
  postgres:
    image: postgres:16
    container_name: payloser-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payloser
      POSTGRES_USER: payloser
      POSTGRES_PASSWORD: payloser
    ports:
      - "5432:5432"
    volumes:
      - payloser-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payloser -d payloser"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  payloser-postgres-data:

